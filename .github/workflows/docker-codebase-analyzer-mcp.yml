name: Build & Publish — codebase-analyzer-mcp

on:
  push:
    branches: [master]
    paths:
      - "Mcp-Servers/Codebase.Analyzer.Mcp/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set build timestamp
        run: echo "TIMESTAMP=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: Mcp-Servers/Codebase.Analyzer.Mcp
          file: Mcp-Servers/Codebase.Analyzer.Mcp/Dockerfile
          push: true
          tags: |
            devesen/codebase-analyzer-mcp:latest
            devesen/codebase-analyzer-mcp:${{ env.TIMESTAMP }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
