services:
  dv-build-log-filter-mcp:
    build:
      context: ..
      dockerfile: Build.Log.Filter/Dockerfile
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-0}
    image: dv-build-log-filter-mcp:local
    stdin_open: true
    tty: false
    ports:
      - "127.0.0.1:8089:8089"
    environment:
      BUFFER_WEB_PORT: "8089"
