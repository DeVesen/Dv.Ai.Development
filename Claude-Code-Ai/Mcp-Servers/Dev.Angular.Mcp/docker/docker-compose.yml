services:
  dv-dev-angular-mcp:
    build:
      context: ..
      dockerfile: Dev.Angular.Mcp/Dockerfile
      args:
        BUILD_NUMBER: ${BUILD_NUMBER:-0}
    image: dv-dev-angular-mcp:local
    stdin_open: true
    tty: false
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      LOG_VIEWER_PORT: "8092"
