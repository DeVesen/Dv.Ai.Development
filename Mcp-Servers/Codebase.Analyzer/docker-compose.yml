services:
  codebase-analyzer:
    build: .
    image: dv-codebase-analyzer-mcp:local
    container_name: codebase-analyzer
    stdin_open: true   # Required for stdio MCP transport
    tty: false
    environment:
      - NODE_ENV=production
    volumes:
      # Mount your project directory so the server can read files
      - ${PROJECT_PATH:-./example}:/workspace:ro
